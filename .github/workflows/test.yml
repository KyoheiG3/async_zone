name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.10
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: |
          for pkg in async_zone async_error_boundary hooks_async_zone async_transition_boundary; do
            echo "::group::Testing $pkg"
            (cd "packages/$pkg" && flutter test --coverage)
            echo "::endgroup::"
          done

      - uses: k1LoW/octocov-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
