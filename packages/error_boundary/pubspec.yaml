name: error_boundary
description: >-
  Declarative error boundary widget for Flutter inspired by React's Error
  Boundary. Catch errors thrown by descendants and render fallback UI with
  reset support.
version: 0.0.1
repository: https://github.com/KyoheiG3/async_zone/tree/main/packages/error_boundary
issue_tracker: https://github.com/KyoheiG3/async_zone/issues
topics:
  - error-boundary
  - error-handling
  - react
  - declarative

resolution: workspace

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  async_zone:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
