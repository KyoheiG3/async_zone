name: hooks_async_zone
description: >-
  flutter_hooks integration for async_zone. Provides HookZoneWidget and
  useAsyncZone so you can use Suspense-style async data alongside Flutter
  hooks.
version: 0.1.0
repository: https://github.com/KyoheiG3/async_zone/tree/main/packages/hooks_async_zone
issue_tracker: https://github.com/KyoheiG3/async_zone/issues
topics:
  - hooks
  - suspense
  - async
  - react
  - flutter-hooks

resolution: workspace

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  async_zone: ^0.1.0
  flutter_hooks: ^0.21.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
